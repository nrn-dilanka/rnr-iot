services:
  # RNR Solutions - RabbitMQ Message Broker with MQTT plugin (Optimized for 2GB RAM)
  rnr_rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rnr_iot_rabbitmq
    ports:
      - "5672:5672"    # AMQP port
      - "15672:15672"  # Management UI
      - "1883:1883"    # MQTT port
    environment:
      RABBITMQ_DEFAULT_USER: rnr_iot_user
      RABBITMQ_DEFAULT_PASS: rnr_iot_2025!
      RABBITMQ_DEFAULT_VHOST: rnr_iot_vhost
    volumes:
      - rnr_iot_rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json
    networks:
      - rnr_iot_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300M
        reservations:
          memory: 150M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # RNR Solutions - PostgreSQL Database (Optimized for 2GB RAM)
  rnr_postgres:
    image: postgres:15-alpine
    container_name: rnr_iot_postgres
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: rnr_iot_platform
      POSTGRES_USER: rnr_iot_user
      POSTGRES_PASSWORD: rnr_iot_2025!
      # PostgreSQL memory optimization
      POSTGRES_SHARED_BUFFERS: 64MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 128MB
      POSTGRES_WORK_MEM: 2MB
      POSTGRES_MAINTENANCE_WORK_MEM: 16MB
    volumes:
      - rnr_iot_postgres_data:/var/lib/postgresql/data
    networks:
      - rnr_iot_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rnr_iot_user} -d ${POSTGRES_DB:-rnr_iot_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RNR Solutions - Backend API Server (Optimized for 2GB RAM)
  rnr_api_server:
    build: 
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: rnr_iot_api_server
    ports:
      - "8000:8000"
    env_file:
      - .env
      - ./backend/.env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      rnr_iot_postgres:
        condition: service_healthy
      rnr_iot_rabbitmq:
        condition: service_healthy
    networks:
      - rnr_iot_network

  # RNR Solutions - Core Worker Service (Optimized for 2GB RAM)
  rnr_worker_service:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: rnr_iot_worker_service
    env_file:
      - .env
      - ./backend/.env
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL}
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      rnr_iot_rabbitmq:
        condition: service_healthy
      rnr_iot_postgres:
        condition: service_healthy
    networks:
      - rnr_iot_network

volumes:
  rnr_iot_rabbitmq_data:
  rnr_iot_postgres_data:
  rnr_firmware_uploads:

networks:
  rnr_iot_network:
    driver: bridge
