# RNR Solutions - RabbitMQ Configuration (Optimized for 2GB RAM)

# Memory management - Use 40% of container memory (256MB * 0.4 = ~100MB)
vm_memory_high_watermark.relative = 0.4
vm_memory_high_watermark_paging_ratio = 0.5

# Disk space management
disk_free_limit.absolute = 50MB

# Connection and channel limits
channel_max = 256
connection_max = 512

# Queue management
queue_master_locator = min-masters

# Reduce memory usage for management plugin
management.rates_mode = none

# Heartbeat settings
heartbeat = 60

# TCP settings
tcp_listen_options.backlog = 128
tcp_listen_options.nodelay = true
tcp_listen_options.linger.on = true
tcp_listen_options.linger.timeout = 0

# Reduce log verbosity
log.console.level = warning
log.file.level = warning

# Cluster settings (single node)
cluster_formation.peer_discovery_backend = rabbit_peer_discovery_classic_config

# MQTT plugin settings - Updated for RNR Solutions
mqtt.default_user = rnr_iot_user
mqtt.default_pass = rnr_iot_2025!
mqtt.vhost = rnr_iot_vhost
mqtt.exchange = amq.topic
mqtt.max_session_expiry_interval_seconds = 86400
mqtt.prefetch = 10
mqtt.subscription_ttl = 1800000
