# RNR Solutions - RabbitMQ Configuration (Optimized for 2GB RAM)
# This configuration replaces deprecated environment variables

## Memory Management (Primary Configuration)
# Set memory high watermark to 40% of container memory (256MB * 0.4 = ~100MB)
vm_memory_high_watermark.relative = 0.4

# When memory usage reaches watermark, start paging messages to disk
vm_memory_high_watermark_paging_ratio = 0.5

## Disk Space Management
# Minimum free disk space before alarm triggers
disk_free_limit.absolute = 50MB

## Connection Limits (Optimized for low memory)
# Maximum number of channels per connection
channel_max = 256

# Maximum number of concurrent connections
connection_max = 512

## Queue Management
# How to distribute queues across cluster nodes (single node setup)
queue_master_locator = min-masters

## Management Plugin Optimizations
# Reduce memory usage by disabling detailed rate statistics
management.rates_mode = none

# Disable sample retention to save memory
management.sample_retention_policies.global.minute = 5
management.sample_retention_policies.global.hour = 60
management.sample_retention_policies.global.day = 1440

## Network and TCP Settings
# Connection heartbeat interval (seconds)
heartbeat = 60

# TCP listener options
tcp_listen_options.backlog = 128
tcp_listen_options.nodelay = true
tcp_listen_options.linger.on = true
tcp_listen_options.linger.timeout = 0

## Logging Configuration (Reduce log verbosity to save memory)
log.console.level = warning
log.file.level = warning

# Disable debug logging
log.connection.level = warning
log.channel.level = warning

## Cluster Configuration (Single Node)
cluster_formation.peer_discovery_backend = rabbit_peer_discovery_classic_config

## MQTT Plugin Configuration (Updated for RNR Solutions)
# Default MQTT user credentials
mqtt.default_user = rnr_iot_user
mqtt.default_pass = rnr_iot_2025!

# MQTT virtual host
mqtt.vhost = rnr_iot_vhost

# MQTT exchange for routing messages
mqtt.exchange = amq.topic

# Session expiry interval (24 hours)
mqtt.max_session_expiry_interval_seconds = 86400

# Number of unacknowledged messages per MQTT client
mqtt.prefetch = 10

# MQTT subscription time-to-live (30 minutes)
mqtt.subscription_ttl = 1800000

# Allow anonymous MQTT connections (set to false for security)
mqtt.allow_anonymous = false

## Memory-Specific Optimizations
# Lazy queue mode for better memory usage (messages stored on disk)
queue_master_locator = min-masters

# Reduce memory usage for message indexing
queue_index_embed_msgs_below = 4096

# Garbage collection settings for Erlang VM
# (These help with memory management in the Erlang runtime)
+hms 2048
+hmbs 2048

## Additional Performance Tuning
# Background garbage collection to free memory more aggressively
+MBas ageffcbf
+MBlmbcs 2048
+MBsbcs 2048

# Scheduler bind type (helps with CPU usage)
+sbt db
